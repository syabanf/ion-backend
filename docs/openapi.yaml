  /api/field/work-orders:
    get:
      tags: [field]
      summary: List work orders (paginated, filterable)
      parameters:
        - { name: status,    in: query, schema: { type: string } }
        - { name: branch_id, in: query, schema: { type: string, format: uuid } }
        - { name: team_id,   in: query, schema: { type: string, format: uuid } }
        - { name: q,         in: query, schema: { type: string }, description: "Free-text search on wo_number / customer name / address" }
        - { name: page,      in: query, schema: { type: integer, default: 1 } }
        - { name: page_size, in: query, schema: { type: integer, default: 50, maximum: 200 } }
      responses:
        "200":
          description: Work-order page
          content:
            application/json:
              schema: { $ref: "#/components/schemas/WorkOrderListResponse" }
    post:
      tags: [field]
      summary: Create a work order (manual entry — most WOs are auto-created from orders / tickets)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [customer_id, wo_type, product_type, address]
              properties:
                customer_id:  { type: string, format: uuid }
                wo_type:      { type: string }
                product_type: { type: string, example: broadband }
                address:      { type: string }
                priority:     { type: string, enum: [low, medium, high, urgent] }
                scheduled_date: { type: string, format: date-time }
                notes:        { type: string }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/WorkOrder" }

  /api/field/work-orders/sla-breaches:
    get:
      tags: [field]
      summary: Work orders past their SLA window
      responses:
        "200":
          description: Breached WOs
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items: { $ref: "#/components/schemas/SLABreach" }

  /api/field/work-orders/{id}:
    get:
      tags: [field]
      summary: Work-order detail (with assignments, checklist, BAST)
      parameters:
        - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
      responses:
        "200":
          description: WO detail
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/WorkOrder"
                  - type: object
                    properties:
                      assignments:
                        type: array
                        items: { $ref: "#/components/schemas/Assignment" }
                      checklist_items:
                        type: array
                        items: { $ref: "#/components/schemas/ChecklistItem" }
                      checklist_responses:
                        type: array
                        items: { $ref: "#/components/schemas/ChecklistResponse" }
                      active_bast: { $ref: "#/components/schemas/BAST" }
                      checklist_min_photos: { type: integer }
        "404": { description: WO not found }

  /api/field/work-orders/{id}/assign:
    post:
      tags: [field]
      summary: Assign a team (creates assignments per technician)
      parameters:
        - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/AssignWORequest" }
      responses:
        "200": { description: Assigned }
        "409": { description: WO already assigned or in a non-assignable status }

  /api/field/work-orders/{id}/bast:
    post:
      tags: [field]
      summary: Submit BAST sign-off (on-site signature OR OTP-remote)
      description: |
        Customer-facing handoff. `sign_off_mode=on_site` requires a
        pre-uploaded signature image (object URL); `otp_remote` requires
        the OTP code sent to the customer's registered phone.
      parameters:
        - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/BASTSubmission" }
      responses:
        "201":
          description: BAST created (status=pending_noc_verify)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/BAST" }
        "400": { description: Missing signature URL (on_site) or OTP (otp_remote) }

  /api/field/work-orders/{id}/checklist:
    post:
      tags: [field]
      summary: Submit checklist responses (idempotent — re-submitting overwrites)
      parameters:
        - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ChecklistSubmission" }
      responses:
        "200":
          description: Items recorded
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items: { $ref: "#/components/schemas/ChecklistResponse" }
