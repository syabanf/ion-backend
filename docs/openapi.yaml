openapi: 3.0.3
info:
  title: ION Core API
  version: "5.0"
  description: |
    HTTP surface for ION Core, an Indonesian ISP enterprise management
    platform. Routes are grouped by the bounded context that serves
    them (identity / crm / billing / field / network / warehouse /
    enterprise / portal).

    Authentication: JWT via `Authorization: Bearer <token>`. Tokens
    are minted by `/api/identity/auth/login` for staff or by the OTP
    flow under `/portal/auth/*` for customers. Public endpoints under
    `/portal/public/*` accept no token but are rate-limited.

servers:
  - url: http://localhost:8080
    description: local dev (api-gateway)

# -----------------------------------------------------------------
# Shared components
# -----------------------------------------------------------------

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    Error:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [code, kind, message]
          properties:
            code: { type: string, example: lead.id_invalid }
            kind: { type: string, enum: [validation, unauthorized, forbidden, not_found, conflict, internal] }
            message: { type: string }

    # ── Portal-mobile contract types ─────────────────────────────
    # These are consumed by the customer Flutter app under
    # mobile/customer_app/. Keep them stable — schema breakage
    # ships as a forced-update prompt on the mobile side.

    PortalAuthToken:
      type: object
      required: [token, expires_at]
      properties:
        token:      { type: string, description: "JWT for /portal/* calls" }
        expires_at: { type: string, format: date-time }
        customer_id: { type: string, format: uuid }

    PortalCustomer:
      type: object
      required: [id, customer_number, full_name, phone, status]
      properties:
        id:              { type: string, format: uuid }
        customer_number: { type: string, example: "CUST-2026-00042" }
        full_name:       { type: string }
        phone:           { type: string }
        email:           { type: string }
        address:         { type: string }
        status:
          type: string
          enum: [active, suspended, terminated, pending]
        branch_id:       { type: string }

    PortalServicePlan:
      type: object
      required: [code, name, speed_mbps, monthly_price]
      properties:
        code:          { type: string, example: BB_100M }
        name:          { type: string }
        speed_mbps:    { type: integer }
        monthly_price: { type: number, format: float }

    PortalAddon:
      type: object
      required: [code, name, addon_type, status, quantity, monthly_fee]
      properties:
        code:         { type: string }
        name:         { type: string }
        addon_type:   { type: string, example: static_ip }
        status:
          type: string
          enum: [pending, active, cancelled]
        quantity:     { type: integer }
        monthly_fee:  { type: number, format: float }
        requested_at: { type: string, format: date-time }
        activated_at: { type: string, format: date-time }

    PortalServicesResponse:
      type: object
      properties:
        plan: { $ref: "#/components/schemas/PortalServicePlan" }
        addons:
          type: array
          items: { $ref: "#/components/schemas/PortalAddon" }
        radius_state:
          type: string
          enum: [ACTIVE, SUSPENDED, DEACTIVATED, UNKNOWN]

    PortalInvoice:
      type: object
      required: [id, invoice_number, status, total_amount, currency, due_at]
      properties:
        id:             { type: string, format: uuid }
        invoice_number: { type: string, example: "INV-2026-00099" }
        status:
          type: string
          enum: [draft, issued, paid, void, overdue]
        subtotal_amount: { type: number, format: float }
        tax_amount:      { type: number, format: float }
        total_amount:    { type: number, format: float }
        currency:        { type: string, example: IDR }
        issued_at:       { type: string, format: date-time }
        due_at:          { type: string, format: date-time }
        paid_at:         { type: string, format: date-time }

    PortalPaymentIntent:
      type: object
      required: [intent_id, status, amount, currency]
      properties:
        intent_id:    { type: string }
        status:       { type: string, enum: [pending, paid, expired, cancelled] }
        amount:       { type: number, format: float }
        currency:     { type: string, example: IDR }
        va_number:    { type: string, description: "Indonesian virtual-account number (if VA)" }
        checkout_url: { type: string, description: "Hosted Xendit checkout link" }
        expires_at:   { type: string, format: date-time }

    PortalNotification:
      type: object
      required: [id, kind, title, body, created_at]
      properties:
        id:        { type: string, format: uuid }
        kind:
          type: string
          enum: [ticket_reply, bast_scheduled, payment_succeeded, sla_breach, plan_change, system]
        title:     { type: string }
        body:      { type: string }
        deep_link: { type: string }
        data:      { type: object, additionalProperties: true }
        read_at:   { type: string, format: date-time }
        created_at:{ type: string, format: date-time }

    PortalNotificationsResponse:
      type: object
      properties:
        items:
          type: array
          items: { $ref: "#/components/schemas/PortalNotification" }
        unread_count: { type: integer }

    PortalTicket:
      type: object
      required: [id, ticket_number, category, status, priority, summary, opened_at]
      properties:
        id:            { type: string, format: uuid }
        ticket_number: { type: string, example: "TKT-20260520-a1b2c3d4" }
        category:
          type: string
          enum: [slow_speed, no_internet, equipment_damage, billing_dispute, general, plan_change]
        priority:      { type: string, enum: [low, medium, high] }
        status:
          type: string
          enum: [open, in_progress, resolved, closed]
        summary:       { type: string }
        description:   { type: string }
        opened_at:     { type: string, format: date-time }
        resolved_at:   { type: string, format: date-time }
        csat_score:    { type: integer, minimum: 1, maximum: 5 }

    PortalTicketMessage:
      type: object
      required: [id, author_kind, body, created_at]
      properties:
        id:          { type: string, format: uuid }
        author_kind: { type: string, enum: [agent, customer, system] }
        body:        { type: string }
        attachments:
          type: array
          items: { type: string, description: "Object URL of attached photo" }
        is_internal_note: { type: boolean, description: "Always false on customer-visible reads" }
        created_at:  { type: string, format: date-time }

    PortalCoverageVerdict:
      type: object
      required: [verdict, cable_distance_m]
      properties:
        verdict:
          type: string
          enum: [covered, covered_with_excess, no_coverage]
        nearest_node_id:   { type: string, format: uuid }
        nearest_node_name: { type: string }
        cable_distance_m:  { type: number, format: float, description: "Approx route distance (haversine × 1.25)" }
        excess_charge:     { type: number, format: float, description: "IDR, only set when verdict=covered_with_excess" }

    PortalSelfOrderRequest:
      type: object
      required: [full_name, phone, address]
      properties:
        full_name:           { type: string }
        phone:               { type: string }
        email:               { type: string }
        address:             { type: string }
        gps_lat:             { type: number, format: float }
        gps_lng:             { type: number, format: float }
        product_id:          { type: string, format: uuid }
        nearest_node_id:     { type: string, format: uuid }
        cable_distance_m:    { type: number, format: float }
        accept_excess_cable: { type: boolean }
        notes:               { type: string }

    PortalSelfOrderResponse:
      type: object
      required: [id, lead_number, status]
      properties:
        id:          { type: string, format: uuid }
        lead_number: { type: string, example: "LD-20260520-a1b2c3d4" }
        status:      { type: string, enum: [new] }
        assigned:    { type: boolean }
        next_steps:  { type: string }

    PortalDeviceTokenRequest:
      type: object
      required: [token, platform]
      properties:
        token:    { type: string, description: "FCM/APNS device token" }
        platform: { type: string, enum: [ios, android] }
        app:      { type: string, example: customer }

    PortalKTPUploadRequest:
      type: object
      required: [front_url]
      properties:
        front_url: { type: string, description: "Pre-uploaded object URL from /api/uploads/photos" }
        back_url:  { type: string }
        reason:    { type: string, description: "Why the re-upload" }

    PortalOTPRequest:
      type: object
      required: [customer_number]
      properties:
        customer_number: { type: string, example: "CUST-2026-00042" }
        phone_last4:     { type: string, minLength: 4, maxLength: 4 }
        email:           { type: string }

    PortalOTPVerify:
      type: object
      required: [customer_number, code]
      properties:
        customer_number: { type: string }
        code:            { type: string, minLength: 4, maxLength: 8 }

    PortalRefreshRequest:
      type: object
      properties:
        # Refresh tokens live in an httpOnly cookie; the body is empty.

    # ── Field / Work-orders contract types (tech mobile + dashboard) ─
    # The Flutter tech_app + the web NOC dashboard consume these.
    # Field handlers all use the same DTO shape from
    # backend/internal/field/adapter/http/dto.go — keep these aligned.

    WorkOrder:
      type: object
      required: [id, wo_number, customer_id, wo_type, product_type, address, priority, status, is_emergency, is_cross_area, created_at]
      properties:
        id:                   { type: string, format: uuid }
        wo_number:            { type: string, example: "WO-20260520-a1b2c3d4" }
        order_id:             { type: string, format: uuid }
        customer_id:          { type: string, format: uuid }
        wo_type:
          type: string
          enum: [new_installation, maintenance, termination, relocation, plan_change]
        product_type:         { type: string, example: broadband }
        maintenance_subtype:  { type: string, example: equipment_damage }
        address:              { type: string }
        branch_id:            { type: string, format: uuid }
        branch_name:          { type: string }
        branch_code:          { type: string }
        priority:             { type: string, enum: [low, medium, high, urgent] }
        status:
          type: string
          enum: [unassigned, assigned, dispatched, in_progress, completed, cancelled, on_hold]
        scheduled_date:       { type: string, format: date-time }
        sla_due_at:           { type: string, format: date-time }
        team_id:              { type: string, format: uuid }
        team_name:            { type: string }
        team_leader_id:       { type: string, format: uuid }
        team_leader_name:     { type: string }
        is_emergency:         { type: boolean }
        is_cross_area:        { type: boolean }
        notes:                { type: string }
        created_at:           { type: string, format: date-time }

    WorkOrderListResponse:
      type: object
      properties:
        items:
          type: array
          items: { $ref: "#/components/schemas/WorkOrder" }
        total:     { type: integer }
        page:      { type: integer }
        page_size: { type: integer }

    Assignment:
      type: object
      required: [id, technician_id, grade, wo_role, assigned_at]
      properties:
        id:               { type: string, format: uuid }
        technician_id:    { type: string, format: uuid }
        technician_name:  { type: string }
        technician_email: { type: string }
        grade:            { type: string, enum: [junior, senior, lead] }
        wo_role:          { type: string, enum: [primary, secondary, observer] }
        assigned_at:      { type: string, format: date-time }

    ChecklistItem:
      type: object
      required: [id, item_order, item_type, label, required]
      properties:
        id:                   { type: string, format: uuid }
        item_order:           { type: integer }
        item_type:
          type: string
          enum: [photo, text, number, checkbox, qr_scan, signature, gps_location, optical_power, speedtest]
        label:                { type: string }
        required:             { type: boolean }
        photo_tag:            { type: string, description: "Photo tag for before/after grouping" }
        gps_required:         { type: boolean }
        min_accuracy_meters:  { type: integer }

    ChecklistResponse:
      type: object
      required: [id, wo_id, template_item_id]
      properties:
        id:               { type: string, format: uuid }
        wo_id:            { type: string, format: uuid }
        template_item_id: { type: string, format: uuid }
        response_text:    { type: string, description: "Encoded value — for item_type=speedtest, format is 'down=X|up=Y|ping_ms=Z'" }
        file_url:         { type: string }
        gps_lat:          { type: number, format: float }
        gps_lng:          { type: number, format: float }
        gps_accuracy_m:   { type: number, format: float }
        submitted_at:     { type: string, format: date-time }

    BAST:
      type: object
      required: [id, wo_id, sign_off_mode, status, submitted_at]
      properties:
        id:                  { type: string, format: uuid }
        wo_id:               { type: string, format: uuid }
        sign_off_mode:       { type: string, enum: [on_site, otp_remote] }
        status:
          type: string
          enum: [pending_noc_verify, verified, rejected]
        customer_sig_url:    { type: string, description: "Object URL of the customer's signature PNG (on-site mode)" }
        gps_lat:             { type: number, format: float }
        gps_lng:             { type: number, format: float }
        submitted_at:        { type: string, format: date-time }
        verified_at:         { type: string, format: date-time }
        rejection_reason:    { type: string }

    BASTSubmission:
      type: object
      required: [sign_off_mode]
      properties:
        sign_off_mode:    { type: string, enum: [on_site, otp_remote] }
        customer_sig_url: { type: string, description: "Required when sign_off_mode=on_site" }
        otp_code:         { type: string, description: "Required when sign_off_mode=otp_remote" }
        gps_lat:          { type: number, format: float }
        gps_lng:          { type: number, format: float }

    ChecklistSubmission:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            type: object
            required: [template_item_id]
            properties:
              template_item_id: { type: string, format: uuid }
              response_text:    { type: string }
              file_url:         { type: string }
              gps_lat:          { type: number, format: float }
              gps_lng:          { type: number, format: float }
              gps_accuracy_m:   { type: number, format: float }

    AssignWORequest:
      type: object
      required: [team_id]
      properties:
        team_id:       { type: string, format: uuid }
        scheduled_date: { type: string, format: date-time }

    StatusWORequest:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [in_progress, on_hold, completed, cancelled]
        notes: { type: string }

    RescheduleRequest:
      type: object
      required: [new_scheduled_date, reason]
      properties:
        new_scheduled_date: { type: string, format: date-time }
        reason:             { type: string }

    Reschedule:
      type: object
      properties:
        id:                 { type: string, format: uuid }
        wo_id:              { type: string, format: uuid }
        previous_date:      { type: string, format: date-time }
        new_scheduled_date: { type: string, format: date-time }
        reason:             { type: string }
        requested_by:       { type: string, format: uuid }
        created_at:         { type: string, format: date-time }

    SLABreach:
      type: object
      properties:
        wo_id:        { type: string, format: uuid }
        wo_number:    { type: string }
        breached_at:  { type: string, format: date-time }
        hours_over:   { type: number, format: float }
        priority:     { type: string }

security:
  - bearerAuth: []

# -----------------------------------------------------------------
# Paths
# -----------------------------------------------------------------

paths:

  # ── Identity ──────────────────────────────────────────────────
  /api/identity/auth/login:
    post:
      tags: [identity]
      summary: Staff login → JWT
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email: { type: string }
                password: { type: string }
      responses:
        "200":
          description: token pair
          content:
            application/json:
              schema:
                type: object
                properties:
                  access_token: { type: string }
                  refresh_token: { type: string }

  # ── CRM lead events + CS referral ─────────────────────────────
  /api/crm/leads/{id}/events:
    get:
      tags: [crm]
      summary: Lead interaction timeline
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: timeline rows ordered newest-first

  /api/crm/leads/overdue:
    get:
      tags: [crm]
      summary: Leads with no activity in N days
      parameters:
        - in: query
          name: mine
          schema: { type: boolean }
        - in: query
          name: days
          schema: { type: integer, default: 7 }
      responses:
        "200":
          description: overdue leads

  /api/crm/cs-referrals:
    post:
      tags: [crm]
      summary: CS agent → sales lead with source=cs_referral
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                full_name: { type: string }
                phone: { type: string }
                address: { type: string }
                ticket_id: { type: string }
      responses:
        "201":
          description: created

  /api/crm/sales/pipeline-revenue:
    get:
      tags: [crm]
      summary: Open + weighted pipeline value
      parameters:
        - in: query
          name: mine
          schema: { type: boolean }
      responses:
        "200":
          description: ok

  /api/crm/sales/my-quota:
    get:
      tags: [crm]
      summary: Caller's monthly quota progress
      responses:
        "200":
          description: ok

  /api/crm/sales/leaderboard:
    get:
      tags: [crm]
      summary: Top-performing reps this month
      responses:
        "200":
          description: ranked list

  /api/crm/commissions/mine:
    get:
      tags: [crm]
      summary: Caller's commission ledger
      responses:
        "200":
          description: ledger rows

  # ── Field — work-orders / tickets / GPS ───────────────────────
  /api/field/work-orders/{id}/tech-locations:
    get:
      tags: [field]
      summary: GPS pings for a WO (ordered ascending)
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }

  /api/field/tech-locations:
    post:
      tags: [field]
      summary: Tech submits a single GPS ping
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                wo_id: { type: string, format: uuid }
                lat: { type: number }
                lng: { type: number }
                accuracy_m: { type: number }
    get:
      tags: [field]
      summary: Team Leader live feed
      parameters:
        - in: query
          name: active_only
          schema: { type: boolean }
        - in: query
          name: since
          schema: { type: string, format: date-time }

  /api/field/work-orders/{id}/journey/start:
    post:
      tags: [field]
      summary: Tech taps "Start journey" (sets journey_started_at)
  /api/field/work-orders/{id}/journey/arrived:
    post:
      tags: [field]
      summary: Tech taps "Arrived" (sets arrived_at)
  /api/field/work-orders/{id}/ont-config:
    get:
      tags: [field]
      summary: ONT credentials — scoped to assigned tech only
  /api/field/work-orders/{id}/suggested-pair:
    get:
      tags: [field]
      summary: Auto-pair senior+junior tech suggestion
  /api/field/work-orders/{id}/cross-area:
    post:
      tags: [field]
      summary: Flag WO for cross-area dispatch

  /api/field/tickets:
    get:
      tags: [field]
      summary: CS ticket list (staff view)
  /api/field/tickets/{id}/messages:
    get:
      tags: [field]
      summary: Conversation timeline
    post:
      tags: [field]
      summary: Staff agent reply (supports attachments)

  /api/field/priority-insertions/mine:
    get:
      tags: [field]
      summary: Tech's pending priority WOs

  # ── Enterprise CPQ ────────────────────────────────────────────
  /api/enterprise/services-catalog:
    get:
      tags: [enterprise]
      summary: Service catalog (with default SLA template binding)
  /api/enterprise/services-catalog/{id}/sla:
    patch:
      tags: [enterprise]
      summary: Bind / unbind default SLA template

  /api/enterprise/projects/{id}/scurve:
    get:
      tags: [enterprise]
      summary: Daily-bucket S-Curve (planned vs actual)
  /api/enterprise/projects/{id}/milestones:
    get:
      tags: [enterprise]
      summary: Project milestones list
  /api/enterprise/projects/{id}/plan-revisions:
    get:
      tags: [enterprise]
      summary: Plan-revision history
    post:
      tags: [enterprise]
      summary: Capture a new revision snapshot

  /api/enterprise/vendor-benchmarks:
    get:
      tags: [enterprise]
      summary: Per-SKU vendor cost benchmark
  /api/enterprise/vendor-metrics:
    get:
      tags: [enterprise]
      summary: Current-month vendor scorecard
  /api/enterprise/vendors/{id}/documents:
    get:
      tags: [enterprise]
      summary: List vendor onboarding documents
    post:
      tags: [enterprise]
      summary: Upload a vendor document
  /api/enterprise/vendor-documents/{id}/verify:
    post:
      tags: [enterprise]
      summary: Verify a vendor document

  /api/enterprise/opportunities/{id}/forecast:
    get:
      tags: [enterprise]
      summary: Stage-probability revenue forecast

  # ── Billing ───────────────────────────────────────────────────
  /api/billing/terminations/consolidated:
    get:
      tags: [billing]
      summary: Union of billing.termination_requests + portal tickets
  /api/billing/webhook-deliveries:
    get:
      tags: [billing]
      summary: Inbound webhook delivery log
  /api/billing/webhook-deliveries/{id}:
    get:
      tags: [billing]
      summary: Single webhook delivery with body preview
  /api/billing/webhooks/xendit:
    post:
      tags: [billing]
      summary: Xendit payment callback (HMAC + IP allow-list verified)
      security: []

  # ── Warehouse ─────────────────────────────────────────────────
  /api/warehouse/stock-dashboard:
    get:
      tags: [warehouse]
      summary: Cross-warehouse stock roll-up
  /api/warehouse/stock-dashboard/alerts:
    get:
      tags: [warehouse]
      summary: Low-stock alerts feed
  /api/warehouse/opname-rollup:
    get:
      tags: [warehouse]
      summary: Cross-warehouse opname progress

  # ── Network ───────────────────────────────────────────────────
  /api/network/customers/{id}/radius-state:
    get:
      tags: [network]
      summary: Live RADIUS session state per customer

  # ── Identity / HRIS ───────────────────────────────────────────
  /api/identity/hris/sync-state:
    get:
      tags: [identity]
      summary: HRIS sync state by provider
  /api/identity/hris/sync-now:
    post:
      tags: [identity]
      summary: Trigger an immediate HRIS sync
  /api/identity/device-token:
    post:
      tags: [identity]
      summary: Register a staff push token

  # ── Portal — customer-facing (Flutter customer_app contract) ──
  # The schemas here ARE the contract — the mobile app consumes them
  # directly. Treat any breaking change as a forced-upgrade event.

  /portal/public/coverage-check:
    post:
      tags: [portal-public]
      summary: Coverage check for a prospective customer
      description: |
        Public + rate-limited (60/min/IP). Given a GPS pair, returns
        whether the address is inside ION's broadband footprint and
        if so, whether excess-cable charges apply.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [lat, lng]
              properties:
                lat: { type: number, format: float }
                lng: { type: number, format: float }
      responses:
        "200":
          description: Verdict
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PortalCoverageVerdict" }
        "400": { description: Missing / invalid lat/lng }
        "429": { description: Rate-limit exceeded }

  /portal/public/products:
    get:
      tags: [portal-public]
      summary: Public products list
      description: Rate-limited 120/min/IP.
      security: []
      responses:
        "200":
          description: Products
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items: { $ref: "#/components/schemas/PortalServicePlan" }

  /portal/public/self-order:
    post:
      tags: [portal-public]
      summary: Self-order lead create
      description: |
        Drops a row in `crm.leads` with `source='self_order'`. Picks
        a sales rep round-robin within the nearest node's branch
        and notifies them in-app. Rate-limited 20/h/IP.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/PortalSelfOrderRequest" }
      responses:
        "201":
          description: Lead created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PortalSelfOrderResponse" }
        "400": { description: Missing full_name / phone / address }
        "429": { description: Too many self-orders from this phone in 24h }

  /portal/auth/otp-request:
    post:
      tags: [portal]
      summary: Customer OTP request
      description: |
        Sends an OTP to the customer's registered phone (via WA/SMS
        once integrated; via log+DB in `CRM_PORTAL_OTP_DEMO=true`).
        Returns `{sent: true}` even for unknown customer_number to
        avoid enumeration.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/PortalOTPRequest" }
      responses:
        "200":
          description: OTP dispatched (or silently ignored)
          content:
            application/json:
              schema:
                type: object
                properties:
                  sent: { type: boolean }

  /portal/auth/otp-verify:
    post:
      tags: [portal]
      summary: Customer OTP verify → portal token
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/PortalOTPVerify" }
      responses:
        "200":
          description: Authenticated
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PortalAuthToken" }
        "401": { description: Invalid or expired OTP }

  /portal/me:
    get:
      tags: [portal]
      summary: Customer profile
      responses:
        "200":
          description: Profile
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PortalCustomer" }
        "401": { description: Unauthorized }

  /portal/services:
    get:
      tags: [portal]
      summary: Subscribed services + add-ons + RADIUS state
      responses:
        "200":
          description: Services bundle
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PortalServicesResponse" }
        "401": { description: Unauthorized }

  /portal/invoices:
    get:
      tags: [portal]
      summary: Customer invoice list (newest first)
      responses:
        "200":
          description: Invoices
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items: { $ref: "#/components/schemas/PortalInvoice" }

  /portal/invoices/{id}/pdf:
    get:
      tags: [portal]
      summary: Invoice PDF (real gofpdf-rendered)
      parameters:
        - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
      responses:
        "200":
          description: PDF stream
          content:
            application/pdf: {}
        "404": { description: Invoice not found or not owned by this customer }

  /portal/invoices/{id}/faktur-pajak:
    get:
      tags: [portal]
      summary: Faktur Pajak number + download URL
      parameters:
        - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
      responses:
        "200":
          description: Faktur metadata
          content:
            application/json:
              schema:
                type: object
                properties:
                  number:        { type: string }
                  download_url:  { type: string }
                  issued_at:     { type: string, format: date-time }
        "404": { description: No faktur for this invoice yet }

  /portal/invoices/{id}/pay:
    post:
      tags: [portal]
      summary: Initiate Xendit-shaped payment intent
      description: |
        Creates a payment intent (idempotent on `invoice_id`). The
        response is provider-agnostic — the Xendit-shaped fields are
        a stable subset that survives a provider swap.
      parameters:
        - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                method: { type: string, enum: [va, checkout], default: va }
      responses:
        "201":
          description: Payment intent created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PortalPaymentIntent" }
        "409": { description: Invoice already paid }

  /portal/tickets:
    get:
      tags: [portal]
      summary: Customer's own tickets
      responses:
        "200":
          description: Tickets
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items: { $ref: "#/components/schemas/PortalTicket" }
    post:
      tags: [portal]
      summary: Open a ticket
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [category, summary]
              properties:
                category:    { type: string }
                priority:    { type: string, enum: [low, medium, high] }
                summary:     { type: string }
                description: { type: string }
      responses:
        "201":
          description: Ticket created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PortalTicket" }

  /portal/tickets/{id}:
    get:
      tags: [portal]
      summary: Ticket detail
      parameters:
        - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
      responses:
        "200":
          description: Ticket
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PortalTicket" }
        "404": { description: Not found / not owned }

  /portal/tickets/{id}/messages:
    parameters:
      - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
    get:
      tags: [portal]
      summary: Conversation timeline (excludes internal notes)
      responses:
        "200":
          description: Messages
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items: { $ref: "#/components/schemas/PortalTicketMessage" }
    post:
      tags: [portal]
      summary: Customer reply (with optional photo attachments)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                body:        { type: string }
                attachments:
                  type: array
                  items: { type: string, description: "Object URL from /api/uploads/photos" }
      responses:
        "201":
          description: Message persisted
          content:
            application/json:
              schema:
                type: object
                properties:
                  id: { type: string, format: uuid }

  /portal/tickets/{id}/csat:
    post:
      tags: [portal]
      summary: Submit CSAT (1-5) + optional comment
      parameters:
        - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [score]
              properties:
                score:   { type: integer, minimum: 1, maximum: 5 }
                comment: { type: string }
      responses:
        "200": { description: Recorded }
        "409": { description: CSAT already submitted for this ticket }

  /portal/notifications:
    get:
      tags: [portal]
      summary: Customer notification inbox + unread_count
      responses:
        "200":
          description: Inbox
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PortalNotificationsResponse" }

  /portal/notifications/{id}/read:
    post:
      tags: [portal]
      summary: Mark one notification read
      parameters:
        - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
      responses:
        "200": { description: Marked }

  /portal/notifications/mark-all-read:
    post:
      tags: [portal]
      summary: Mark every unread notification read
      responses:
        "200":
          description: Marked
          content:
            application/json:
              schema:
                type: object
                properties:
                  marked: { type: integer }

  /portal/active-wo/tech-location:
    get:
      tags: [portal]
      summary: Live tech location for the customer's active WO
      description: |
        Returns the most recent GPS ping (within 10 min) from the
        technician assigned to the customer's active install /
        maintenance WO. Used by the live-tracking card.
      responses:
        "200":
          description: Latest fix
          content:
            application/json:
              schema:
                type: object
                properties:
                  has_active_wo: { type: boolean }
                  wo_number:     { type: string }
                  tech_name:     { type: string }
                  lat:           { type: number, format: float }
                  lng:           { type: number, format: float }
                  captured_at:   { type: string, format: date-time }
                  eta_minutes:   { type: integer, description: "Heuristic ETA from distance + avg speed" }

  /portal/ktp:
    post:
      tags: [portal]
      summary: KTP re-upload (drops a CS ticket for verification)
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/PortalKTPUploadRequest" }
      responses:
        "201":
          description: Ticket opened for review
          content:
            application/json:
              schema:
                type: object
                properties:
                  ticket_id:     { type: string, format: uuid }
                  ticket_number: { type: string }

  /portal/device-token:
    post:
      tags: [portal]
      summary: Register a customer push token (FCM/APNS)
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/PortalDeviceTokenRequest" }
      responses:
        "200": { description: Registered (idempotent on token) }
