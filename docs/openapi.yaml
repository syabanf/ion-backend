      security: [{ bearerAuth: [] }]
      responses:
        "200": { description: OK }
        "401": { description: Unauthorized }
  /api/field/work-orders/{id}/reschedule:
    post:
      tags: [field]
      summary: Request a reschedule (logged + applied to the WO)
      parameters:
        - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/RescheduleRequest" }
      responses:
        "201":
          description: Reschedule recorded
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Reschedule" }

  /api/field/work-orders/{id}/reschedules:
    get:
      tags: [field]
      summary: Reschedule history for a WO (newest first)
      parameters:
        - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
      responses:
        "200":
          description: History
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items: { $ref: "#/components/schemas/Reschedule" }

  /api/field/work-orders/{id}/resolution:
    post:
      tags: [field]
      summary: Add a free-form resolution item to the WO log
      parameters:
        - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [description]
              properties:
                description: { type: string }
                parts_used:  { type: string }
                cost:        { type: number, format: float }
      responses:
        "201": { description: Added }

  /api/field/work-orders/{id}/route:
    post:
      tags: [field]
      summary: Auto-route the WO to the best team (heuristic — branch + load)
      parameters:
        - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
      responses:
        "200":
          description: Routed
          content:
            application/json:
              schema:
                type: object
                properties:
                  team_id:    { type: string, format: uuid }
                  team_name:  { type: string }
                  reason:     { type: string }

  /api/field/work-orders/{id}/speedtest:
    get:
      tags: [field]
      summary: Parsed speedtest from the WO's checklist (latest reading)
      parameters:
        - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
      responses:
        "200":
          description: Parsed speedtest
          content:
            application/json:
              schema:
                type: object
                properties:
                  wo_id: { type: string, format: uuid }
                  found: { type: boolean }
                  speedtest:
                    type: object
                    properties:
                      wo_id:         { type: string, format: uuid }
                      wo_number:     { type: string }
                      down_mbps:     { type: number, format: float }
                      up_mbps:       { type: number, format: float }
                      ping_ms:       { type: number, format: float }
                      raw:           { type: string }
                      captured_at:   { type: string, format: date-time }
                      tech_user_id:  { type: string, format: uuid }
                      tech_full_name: { type: string }

  /api/field/work-orders/{id}/status:
    post:
      tags: [field]
      summary: Flip the WO status (in_progress, completed, etc.)
      parameters:
        - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/StatusWORequest" }
      responses:
        "200":
          description: Status flipped
          content:
            application/json:
              schema: { $ref: "#/components/schemas/WorkOrder" }
        "409": { description: Illegal status transition }
